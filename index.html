<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor Trabajo</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{margin:0;padding-bottom:90px;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827;}
header{background:#111827;color:white;padding:14px;text-align:center;font-size:22px;font-weight:bold;}
.container{padding:14px;max-width:1200px;margin:auto;}
button{border:none;background:#2563eb;color:white;padding:10px;border-radius:10px;font-weight:bold;cursor:pointer;font-size:14px;}
button.green{background:#16a34a;}
button.red{background:#dc2626;}
button.gray{background:#6b7280;}
button.dark{background:#111827;}
button.small{padding:7px 9px;font-size:12px;border-radius:8px;}
.hidden{display:none;}
.menu-principal{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.menu-principal button{min-height:80px;font-size:20px;border-radius:16px;background:#111827;}
.menu-principal button.activo{background:#16a34a;}
.clientes{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
.cliente-btn{background:#16a34a;color:white;border-radius:10px;padding:14px;font-weight:bold;min-height:55px;width:auto;min-width:130px;max-width:240px;}
.cliente-btn.activo{outline:4px solid #111827;}
.ficha{background:white;border-radius:12px;padding:15px;box-shadow:0 1px 6px rgba(0,0,0,0.2);}
.bloque{border:1px solid #d1d5db;border-radius:12px;padding:15px;margin-bottom:18px;background:#fafafa;}
input,textarea,select{width:100%;padding:10px;margin-top:5px;margin-bottom:12px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box;font-size:15px;}
textarea{min-height:90px;}
label{font-weight:bold;font-size:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.resultado{background:white;border:1px solid #d1d5db;border-radius:10px;padding:10px;margin-bottom:8px;}
.resultado.stock-cero{background:#f1f5f9;color:#6b7280;opacity:0.65;}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.check-line{display:flex;align-items:center;gap:10px;margin-top:8px;margin-bottom:12px;}
.check-line input{width:auto;margin:0;}
.tabla-wrap{overflow-x:auto;}
table{border-collapse:collapse;width:100%;background:white;}
th,td{border:1px solid #d1d5db;padding:8px;text-align:left;font-size:14px;}
th{background:#e5e7eb;}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e5e7eb;font-weight:bold;font-size:12px;}
.bottom-actions{position:fixed;left:0;right:0;bottom:0;background:#111827;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:999;}
.bottom-actions button{padding:9px 5px;font-size:13px;}
@media (min-width:768px){
  .bottom-actions{max-width:720px;margin:auto;left:50%;transform:translateX(-50%);border-radius:14px 14px 0 0;}
  .ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
}
</style>
</head>
<body>
<header>Gestor Trabajo</header>
<div class="container">
<div class="bloque">
  <h3>Excel maestro</h3>
  <input type="file" id="excelMaestro" accept=".xlsx,.xlsm">
  <button onclick="importarExcelMaestro()">Importar Excel maestro</button>
  <button onclick="exportarExcelMaestro()">Exportar Excel maestro</button>
</div>
<div class="menu-principal">
  <button id="tabClientes" onclick="mostrarSeccion('clientes')">Clientes</button>
  <button id="tabInventario" onclick="mostrarSeccion('inventario')">Inventario</button>
</div>
<section id="seccionClientes" class="hidden">
  <button class="dark" onclick="mostrarAltaCliente()">+ Añadir cliente</button>
  <div id="altaCliente" class="bloque hidden" style="margin-top:12px;">
    <label>Nombre del cliente</label>
    <input type="text" id="nuevoClienteNombre" placeholder="Ej: BBVA">
    <button class="green" onclick="crearClienteManual()">Crear cliente</button>
  </div>
  <br>
  <div id="clientes" class="clientes"></div>
  <div id="fichaCliente" class="ficha hidden">
    <h2 id="tituloCliente"></h2>
    <div class="ficha-grid">
      <div class="bloque">
        <h3>Datos generales del cliente</h3>
        <label>Cliente</label>
        <input type="text" id="clienteNombre" oninput="actualizarCliente()" placeholder="Nombre del cliente">
        <label>PassSupervisor</label>
        <input type="password" id="clientePassSupervisor" oninput="actualizarCliente()">
        <label>PassClaves</label>
        <input type="password" id="clientePassClaves" oninput="actualizarCliente()">
        <label>Modelo EPP</label>
        <select id="clienteModeloEPP" onchange="actualizarCliente()">
          <option value="">Seleccionar</option>
        </select>
        <button class="gray small" onclick="togglePasswordsCliente()">Mostrar / ocultar passwords</button>
        <button class="red small" onclick="borrarClienteActivo()">Borrar cliente</button>
      </div>
      <div class="bloque">
        <h3>Notas generales</h3>
        <textarea id="clienteNotas" oninput="actualizarCliente()" placeholder="Notas generales del cliente"></textarea>
      </div>
    </div>
    <div class="bloque">
      <h3>Software del cliente</h3>
      <input type="hidden" id="softwareUid">
      <div class="grid">
        <div>
          <label>Placa</label>
          <select id="softwarePlaca">
            <option value="">Seleccionar</option>
            <option value="Pocono">Pocono</option>
            <option value="Estoril">Estoril</option>
            <option value="Misano">Misano</option>
            <option value="Cometlake">Cometlake</option>
          </select>
        </div>
        <div>
          <label>Máster</label>
          <select id="softwareMaster">
            <option value="">Seleccionar</option>
            <option value="W7">W7</option>
            <option value="W10">W10</option>
          </select>
        </div>
        <div>
          <label>Versión</label>
          <input type="text" id="softwareVersion">
        </div>
        <div>
          <label>PassBios</label>
          <input type="password" id="softwarePassBios">
        </div>
        <div>
          <label>PassBBS</label>
          <input type="password" id="softwarePassBBS">
        </div>
      </div>
      <label class="check-line">
        <input type="checkbox" id="softwareGenerado">
        Generado
      </label>
      <div class="row-actions">
        <button class="green" onclick="guardarSoftwareCliente()">Guardar software</button>
        <button class="gray" onclick="limpiarSoftware()">Limpiar software</button>
      </div>
      <br>
      <div id="tablaSoftwareCliente" class="tabla-wrap"></div>
    </div>
    <div id="moduloEuronet" class="hidden">
      <div class="bloque">
        <h3>Cajeros Euronet</h3>
        <label>Buscar ENES</label>
        <div style="display:flex;gap:10px;align-items:center;">
          <div style="font-weight:bold;">ENES:</div>
          <input type="text" id="buscarEnes" placeholder="6677">
          <button onclick="buscarCajero()">Buscar</button>
        </div>
        <hr>
        <input type="hidden" id="cajeroUid">
        <div class="grid">
          <div><label>ID</label><input type="text" id="cajeroId"></div>
          <div><label>IP</label><input type="text" id="cajeroIp"></div>
          <div><label>MASK</label><input type="text" id="cajeroMask"></div>
          <div><label>GATEWAY</label><input type="text" id="cajeroGateway"></div>
          <div><label>PC</label><input type="text" id="cajeroPc"></div>
        </div>
        <div class="row-actions">
          <button class="green" onclick="guardarCajero()">Guardar cajero</button>
          <button class="gray" onclick="limpiarCajero()">Limpiar cajero</button>
          <button class="red" onclick="borrarCajero()">Borrar cajero</button>
        </div>
      </div>
    </div>
  </div>
</section>
<section id="seccionInventario" class="hidden">
  <div class="ficha">
    <h2>Inventario trastero</h2>
    <div class="bloque">
      <h3>Buscar pieza</h3>
      <label>Filtrar por familia</label>
      <select id="filtroFamilia" onchange="buscarPiezas()">
        <option value="">Todas las familias</option>
      </select>
      <button class="red" type="button" onclick="borrarFamilia()">Borrar familia seleccionada</button>
      <label>Buscar por texto</label>
      <input type="text" id="buscarInventario" placeholder="Ej: fuente, presenter, contactless, part number..." oninput="buscarPiezas()">
      <div id="resultadosInventario"></div>
    </div>
    <div class="bloque">
      <h3>Añadir / editar pieza</h3>
      <input type="hidden" id="piezaUid">
      <label>Familia</label>
      <input type="text" id="piezaFamilia">
      <label>Descripción</label>
      <input type="text" id="piezaDescripcion">
      <label>PartNumber</label>
      <input type="text" id="piezaPartNumber">
      <label>Stock</label>
      <input type="number" id="piezaStock">
      <label>Técnico</label>
      <input type="text" id="piezaTecnico">
      <label>Notas</label>
      <textarea id="piezaNotas"></textarea>
      <div class="row-actions">
        <button class="green" onclick="guardarPieza()">Guardar pieza</button>
        <button class="gray" onclick="limpiarPieza()">Limpiar</button>
        <button class="red" onclick="borrarPieza()">Borrar pieza seleccionada</button>
      </div>
    </div>
  </div>
</section>
</div>
<div class="bottom-actions">
  <button class="green" onclick="guardar()">Guardar</button>
  <button onclick="exportarJSON()">Exportar JSON</button>
  <button onclick="importarJSON()">Importar JSON</button>
  <button class="red" onclick="borrarTodo()">Borrar</button>
</div>
<script>
const STORAGE_KEY = "gestor_trabajo_excel_maestro_v4_generado";
let datos = cargarDatos();
let clienteActivo = null;
let passwordsVisibles = false;
function estructuraBase(){
  return {
    clientes: [],
    software: [],
    euronet: [],
    inventario: []
  };
}
function uid(){
  return "id_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
}
function normalizarTexto(txt){
  return String(txt || "")
    .replace(/\u00A0/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}
function textoABooleano(valorCampo){
  const v = normalizarTexto(valorCampo).toLowerCase();
  return (
    valorCampo === true ||
    v === "sí" ||
    v === "si" ||
    v === "true" ||
    v === "x" ||
    v === "1" ||
    v === "ok" ||
    v === "generado"
  );
}
function booleanoATexto(valorCampo){
  return valorCampo ? "Sí" : "No";
}
function cargarDatos(){
  const guardado = localStorage.getItem(STORAGE_KEY);
  if(!guardado){
    const base = estructuraBase();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(base));
    return base;
  }
  try{
    const cargado = JSON.parse(guardado);
    if(!Array.isArray(cargado.clientes)) cargado.clientes = [];
    if(!Array.isArray(cargado.software)) cargado.software = [];
    if(!Array.isArray(cargado.euronet)) cargado.euronet = [];
    if(!Array.isArray(cargado.inventario)) cargado.inventario = [];
    cargado.software.forEach(s => {
      if(typeof s.generado === "undefined"){
        s.generado = false;
      }
    });
    return cargado;
  }catch(e){
    return estructuraBase();
  }
}
function guardarLocal(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
}
function guardar(){
  guardarLocal();
  pintarClientes();
  pintarSoftwareCliente();
  actualizarFamilias();
  buscarPiezas();
}
function mostrarSeccion(seccion){
  document.getElementById("seccionClientes").classList.toggle("hidden", seccion !== "clientes");
  document.getElementById("seccionInventario").classList.toggle("hidden", seccion !== "inventario");
  document.getElementById("tabClientes").classList.toggle("activo", seccion === "clientes");
  document.getElementById("tabInventario").classList.toggle("activo", seccion === "inventario");
  if(seccion === "clientes"){
    pintarClientes();
    pintarSoftwareCliente();
  }
  if(seccion === "inventario"){
    actualizarFamilias();
    buscarPiezas();
  }
}
function rellenarModeloEPP(){
  const select = document.getElementById("clienteModeloEPP");
  if(!select) return;
  select.innerHTML = '<option value="">Seleccionar</option>';
  for(let i = 1; i <= 99; i++){
    const v = String(i).padStart(2, "0");
    const opt = document.createElement("option");
    opt.value = "Spanish " + v;
    opt.textContent = "Spanish " + v;
    select.appendChild(opt);
  }
}
/* EXCEL */
function buscarHoja(wb, nombre){
  const hoja = wb.SheetNames.find(n =>
    normalizarTexto(n).toLowerCase() === normalizarTexto(nombre).toLowerCase()
  );
  return hoja ? wb.Sheets[hoja] : null;
}
function valor(row, nombres){
  const claves = Object.keys(row);
  for(const nombre of nombres){
    const clave = claves.find(k =>
      normalizarTexto(k).toLowerCase() === normalizarTexto(nombre).toLowerCase()
    );
    if(clave !== undefined){
      return row[clave];
    }
  }
  return "";
}
function normalizarCliente(row){
  return {
    uid: uid(),
    cliente: normalizarTexto(valor(row, ["Cliente"])),
    passSupervisor: normalizarTexto(valor(row, ["PassSupervisor", "Pass Supervisor"])),
    passClaves: normalizarTexto(valor(row, ["PassClaves", "Pass Claves"])),
    modeloEPP: normalizarTexto(valor(row, ["Modelo EPP", "ModeloEPP", "tipo EPP", "Tipo EPP"])),
    notas: normalizarTexto(valor(row, ["Notas"]))
  };
}
function normalizarSoftware(row){
  return {
    uid: uid(),
    cliente: normalizarTexto(valor(row, ["Cliente"])),
    placa: normalizarTexto(valor(row, ["Placa"])),
    master: normalizarTexto(valor(row, ["Master", "Máster"])),
    version: normalizarTexto(valor(row, ["Version", "Versión"])),
    passBios: normalizarTexto(valor(row, ["PassBios", "PassBIOS", "Pass Bios", "Pass BIOS"])),
    passBBS: normalizarTexto(valor(row, ["PassBBS", "Pass BBS"])),
    generado: textoABooleano(valor(row, ["Generado"]))
  };
}
function normalizarInventario(row){
  return {
    uid: uid(),
    familia: normalizarTexto(valor(row, ["Familia"])),
    descripcion: normalizarTexto(valor(row, ["Descripcion", "Descripción"])),
    partNumber: normalizarTexto(valor(row, ["PartNumber", "PARTNUMBER", "Part Number"])),
    stock: valor(row, ["Stock"]),
    tecnico: normalizarTexto(valor(row, ["Tecnico", "Técnico"])),
    notas: normalizarTexto(valor(row, ["Notas"]))
  };
}
function normalizarEuronet(row){
  return {
    uid: uid(),
    enes: normalizarTexto(valor(row, ["ENES"])),
    id: normalizarTexto(valor(row, ["ID"])),
    ip: normalizarTexto(valor(row, ["IP"])),
    mask: normalizarTexto(valor(row, ["MASK", "Mask"])),
    gateway: normalizarTexto(valor(row, ["GATEWAY", "Gateway"])),
    pc: normalizarTexto(valor(row, ["PC"]))
  };
}
async function importarExcelMaestro(){
  const file = document.getElementById("excelMaestro").files[0];
  if(!file){
    alert("Selecciona el Excel maestro.");
    return;
  }
  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const nuevaBase = estructuraBase();
  const hojaClientes = buscarHoja(wb, "Clientes");
  const hojaSoftware = buscarHoja(wb, "Software");
  const hojaEuronet = buscarHoja(wb, "Euronet");
  const hojaStock = buscarHoja(wb, "Stock");
  if(hojaClientes){
    nuevaBase.clientes = XLSX.utils.sheet_to_json(hojaClientes, { defval: "" })
      .map(normalizarCliente)
      .filter(c => c.cliente);
  }
  if(hojaSoftware){
    nuevaBase.software = XLSX.utils.sheet_to_json(hojaSoftware, { defval: "" })
      .map(normalizarSoftware)
      .filter(s => s.cliente || s.placa || s.master || s.version || s.passBios || s.passBBS);
  }
  if(hojaEuronet){
    nuevaBase.euronet = XLSX.utils.sheet_to_json(hojaEuronet, { defval: "" })
      .map(normalizarEuronet)
      .filter(c => c.enes);
  }
  if(hojaStock){
    nuevaBase.inventario = XLSX.utils.sheet_to_json(hojaStock, { defval: "" })
      .map(normalizarInventario)
      .filter(p => p.familia || p.descripcion || p.partNumber);
  }
  datos = nuevaBase;
  clienteActivo = null;
  guardar();
  document.getElementById("fichaCliente").classList.add("hidden");
  alert(
    "Excel importado.\n\n" +
    "Clientes: " + datos.clientes.length +
    "\nSoftware: " + datos.software.length +
    "\nEuronet: " + datos.euronet.length +
    "\nInventario: " + datos.inventario.length
  );
}
function exportarExcelMaestro(){
  guardarLocal();
  const wb = XLSX.utils.book_new();
  const clientesRows = datos.clientes.map(c => ({
    Cliente: c.cliente,
    PassSupervisor: c.passSupervisor,
    PassClaves: c.passClaves,
    "Modelo EPP": c.modeloEPP,
    Notas: c.notas
  }));
  const softwareRows = datos.software.map(s => ({
    Cliente: s.cliente,
    Placa: s.placa,
    Master: s.master,
    Version: s.version,
    PassBios: s.passBios,
    PassBBS: s.passBBS,
    Generado: booleanoATexto(s.generado)
  }));
  const euronetRows = datos.euronet.map(c => ({
    ENES: c.enes,
    ID: c.id,
    IP: c.ip,
    MASK: c.mask,
    GATEWAY: c.gateway,
    PC: c.pc
  }));
  const stockRows = datos.inventario.map(p => ({
    Familia: p.familia,
    Descripcion: p.descripcion,
    PartNumber: p.partNumber,
    Stock: p.stock,
    Tecnico: p.tecnico,
    Notas: p.notas
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(clientesRows), "Clientes");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(softwareRows), "Software");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(euronetRows), "Euronet");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stockRows), "Stock");
  XLSX.writeFile(wb, "baseherramienta_actualizada.xlsx");
}
/* CLIENTES */
function pintarClientes(){
  const cont = document.getElementById("clientes");
  if(!cont) return;
  cont.innerHTML = "";
  datos.clientes
    .slice()
    .sort((a,b) => a.cliente.localeCompare(b.cliente, "es"))
    .forEach(c => {
      const b = document.createElement("button");
      b.className = "cliente-btn";
      if(clienteActivo === c.uid){
        b.classList.add("activo");
      }
      b.textContent = c.cliente;
      b.addEventListener("click", () => abrirCliente(c.uid));
      cont.appendChild(b);
    });
}
function abrirCliente(clienteUid){
  if(clienteActivo === clienteUid){
    clienteActivo = null;
    document.getElementById("fichaCliente").classList.add("hidden");
    document.getElementById("moduloEuronet").classList.add("hidden");
    pintarClientes();
    return;
  }
  const c = datos.clientes.find(x => x.uid === clienteUid);
  if(!c) return;
  clienteActivo = clienteUid;
  document.getElementById("fichaCliente").classList.remove("hidden");
  document.getElementById("tituloCliente").textContent = c.cliente;
  document.getElementById("clienteNombre").value = c.cliente || "";
  document.getElementById("clientePassSupervisor").value = c.passSupervisor || "";
  document.getElementById("clientePassClaves").value = c.passClaves || "";
  document.getElementById("clienteModeloEPP").value = c.modeloEPP || "";
  document.getElementById("clienteNotas").value = c.notas || "";
  const esEuronet = String(c.cliente).toLowerCase().includes("euronet");
  document.getElementById("moduloEuronet").classList.toggle("hidden", !esEuronet);
  limpiarSoftware();
  pintarClientes();
  pintarSoftwareCliente();
}
function clienteActual(){
  if(!clienteActivo) return null;
  return datos.clientes.find(x => x.uid === clienteActivo) || null;
}
function actualizarCliente(){
  const c = clienteActual();
  if(!c) return;
  const nombreAnterior = c.cliente;
  c.cliente = normalizarTexto(document.getElementById("clienteNombre").value);
  c.passSupervisor = document.getElementById("clientePassSupervisor").value;
  c.passClaves = document.getElementById("clientePassClaves").value;
  c.modeloEPP = document.getElementById("clienteModeloEPP").value;
  c.notas = document.getElementById("clienteNotas").value;
  if(c.cliente && nombreAnterior && c.cliente !== nombreAnterior){
    datos.software.forEach(s => {
      if(s.cliente === nombreAnterior) s.cliente = c.cliente;
    });
  }
  document.getElementById("tituloCliente").textContent = c.cliente || "Cliente sin nombre";
  guardarLocal();
  pintarClientes();
  pintarSoftwareCliente();
}
function borrarClienteActivo(){
  const c = clienteActual();
  if(!c) return;
  const totalSoftware = datos.software.filter(s => s.cliente === c.cliente).length;
  if(!confirm("¿Seguro que quieres borrar el cliente '" + c.cliente + "'?\n\nTambién se borrarán " + totalSoftware + " filas de software de ese cliente.")){
    return;
  }
  datos.clientes = datos.clientes.filter(x => x.uid !== c.uid);
  datos.software = datos.software.filter(s => s.cliente !== c.cliente);
  clienteActivo = null;
  guardarLocal();
  document.getElementById("fichaCliente").classList.add("hidden");
  document.getElementById("moduloEuronet").classList.add("hidden");
  pintarClientes();
  alert("Cliente borrado.");
}
function togglePasswordsCliente(){
  passwordsVisibles = !passwordsVisibles;
  const tipo = passwordsVisibles ? "text" : "password";
  ["clientePassSupervisor","clientePassClaves","softwarePassBios","softwarePassBBS"].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.type = tipo;
  });
}
function mostrarAltaCliente(){
  document.getElementById("altaCliente").classList.toggle("hidden");
}
function crearClienteManual(){
  const input = document.getElementById("nuevoClienteNombre");
  const nombre = normalizarTexto(input.value);
  if(!nombre){
    alert("Escribe el nombre del cliente.");
    return;
  }
  const existe = datos.clientes.some(c =>
    normalizarTexto(c.cliente).toLowerCase() === nombre.toLowerCase()
  );
  if(existe){
    alert("Ese cliente ya existe.");
    return;
  }
  const nuevo = {
    uid: uid(),
    cliente: nombre,
    passSupervisor: "",
    passClaves: "",
    modeloEPP: "",
    notas: ""
  };
  datos.clientes.push(nuevo);
  input.value = "";
  document.getElementById("altaCliente").classList.add("hidden");
  guardar();
  abrirCliente(nuevo.uid);
}
/* SOFTWARE */
function pintarSoftwareCliente(){
  const cont = document.getElementById("tablaSoftwareCliente");
  if(!cont) return;
  cont.innerHTML = "";
  const c = clienteActual();
  if(!c) return;
  const filas = datos.software
    .filter(s => s.cliente === c.cliente)
    .slice()
    .sort((a,b) => String(a.placa).localeCompare(String(b.placa), "es"));
  if(filas.length === 0){
    cont.innerHTML = "<p>No hay software registrado para este cliente.</p>";
    return;
  }
  const table = document.createElement("table");
  table.innerHTML = `
    <thead>
      <tr>
        <th>Placa</th>
        <th>Master</th>
        <th>Version</th>
        <th>PassBios</th>
        <th>PassBBS</th>
        <th>Generado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector("tbody");
  filas.forEach(s => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${s.placa || ""}</td>
      <td><span class="badge">${s.master || ""}</span></td>
      <td>${s.version || ""}</td>
      <td>${s.passBios ? "*****" : ""}</td>
      <td>${s.passBBS ? "*****" : ""}</td>
      <td>${s.generado ? "✅" : "⬜"}</td>
      <td></td>
    `;
    const td = tr.querySelector("td:last-child");
    const btnEditar = document.createElement("button");
    btnEditar.className = "gray small";
    btnEditar.textContent = "Editar";
    btnEditar.addEventListener("click", () => editarSoftware(s.uid));
    const btnBorrar = document.createElement("button");
    btnBorrar.className = "red small";
    btnBorrar.textContent = "Borrar";
    btnBorrar.style.marginLeft = "6px";
    btnBorrar.addEventListener("click", () => borrarSoftware(s.uid));
    td.appendChild(btnEditar);
    td.appendChild(btnBorrar);
    tbody.appendChild(tr);
  });
  cont.appendChild(table);
}
function editarSoftware(softwareUid){
  const s = datos.software.find(x => x.uid === softwareUid);
  if(!s) return;
  document.getElementById("softwareUid").value = s.uid;
  document.getElementById("softwarePlaca").value = s.placa || "";
  document.getElementById("softwareMaster").value = s.master || "";
  document.getElementById("softwareVersion").value = s.version || "";
  document.getElementById("softwarePassBios").value = s.passBios || "";
  document.getElementById("softwarePassBBS").value = s.passBBS || "";
  document.getElementById("softwareGenerado").checked = !!s.generado;
}
function guardarSoftwareCliente(){
  const c = clienteActual();
  if(!c){
    alert("Selecciona un cliente primero.");
    return;
  }
  const softwareUid = document.getElementById("softwareUid").value;
  let s = softwareUid ? datos.software.find(x => x.uid === softwareUid) : null;
  if(!s){
    s = { uid: uid(), cliente: c.cliente };
    datos.software.push(s);
  }
  s.cliente = c.cliente;
  s.placa = document.getElementById("softwarePlaca").value;
  s.master = document.getElementById("softwareMaster").value;
  s.version = normalizarTexto(document.getElementById("softwareVersion").value);
  s.passBios = document.getElementById("softwarePassBios").value;
  s.passBBS = document.getElementById("softwarePassBBS").value;
  s.generado = document.getElementById("softwareGenerado").checked;
  if(!s.placa || !s.master){
    alert("Selecciona Placa y Máster.");
    return;
  }
  guardarLocal();
  limpiarSoftware();
  pintarSoftwareCliente();
  alert("Software guardado.");
}
function borrarSoftware(softwareUid){
  const s = datos.software.find(x => x.uid === softwareUid);
  if(!s) return;
  if(!confirm("¿Seguro que quieres borrar este software?\n\n" + s.cliente + " / " + s.placa + " / " + s.master)){
    return;
  }
  datos.software = datos.software.filter(x => x.uid !== softwareUid);
  guardarLocal();
  limpiarSoftware();
  pintarSoftwareCliente();
  alert("Software borrado.");
}
function limpiarSoftware(){
  document.getElementById("softwareUid").value = "";
  document.getElementById("softwarePlaca").value = "";
  document.getElementById("softwareMaster").value = "";
  document.getElementById("softwareVersion").value = "";
  document.getElementById("softwarePassBios").value = "";
  document.getElementById("softwarePassBBS").value = "";
  document.getElementById("softwareGenerado").checked = false;
}
/* EURONET */

  const input = document.getElementById("buscarEnes");

  document.getElementById("cajeroMask").value = c.mask || "";

}
function guardarCajero(){
  const enes = normalizarTexto(document.getElementById("buscarEnes").value);
  if(!enes){
    alert("Introduce ENES.");
    return;
  }
  const cajeroUid = document.getElementById("cajeroUid").value;
  let c = cajeroUid ? datos.euronet.find(x => x.uid === cajeroUid) : null;
  if(!c){
    c = datos.euronet.find(x => normalizarTexto(x.enes) === enes);
  }
  if(c && !cajeroUid && !confirm("Ese ENES ya existe. ¿Quieres sobrescribirlo?")){
    return;
  }
  if(!c){
    c = { uid: uid() };
    datos.euronet.push(c);
  }
  c.enes = enes;
  c.id = document.getElementById("cajeroId").value;
  c.ip = document.getElementById("cajeroIp").value;
  c.mask = document.getElementById("cajeroMask").value;
  c.gateway = document.getElementById("cajeroGateway").value;
  c.pc = document.getElementById("cajeroPc").value;
  document.getElementById("cajeroUid").value = c.uid;
  guardarLocal();
  alert("Cajero guardado.");
}
function borrarCajero(){
  const cajeroUid = document.getElementById("cajeroUid").value;
  const enes = normalizarTexto(document.getElementById("buscarEnes").value);
  const c = cajeroUid
    ? datos.euronet.find(x => x.uid === cajeroUid)
    : datos.euronet.find(x => normalizarTexto(x.enes) === enes);
  if(!c){
    alert("No encontrado.");
    return;
  }
  if(!confirm("¿Seguro que quieres borrar el cajero ENES " + c.enes + "?")){
    return;
  }
  datos.euronet = datos.euronet.filter(x => x.uid !== c.uid);
  guardarLocal();
  limpiarCajero();
  alert("Cajero borrado.");
}
function limpiarCajero(){

/* INVENTARIO */
function actualizarFamilias(){
  const select = document.getElementById("filtroFamilia");
  if(!select) return;
  const actual = normalizarTexto(select.value);
  select.innerHTML = '<option value="">Todas las familias</option>';
  const familias = [...new Set(
    datos.inventario
      .map(p => normalizarTexto(p.familia))
      .filter(Boolean)
  )].sort((a,b) => a.localeCompare(b, "es"));
  familias.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f;
    select.appendChild(opt);
  });
  if(familias.includes(actual)){
    select.value = actual;
  }
}
function buscarPiezas(){
  const cont = document.getElementById("resultadosInventario");
  if(!cont) return;
  const q = normalizarTexto(document.getElementById("buscarInventario")?.value || "").toLowerCase();
  const familia = normalizarTexto(document.getElementById("filtroFamilia")?.value || "");
  cont.innerHTML = "";
  const resultados = datos.inventario
    .filter(p => {
      const pfamilia = normalizarTexto(p.familia);
      const pdescripcion = normalizarTexto(p.descripcion);
      const ppart = normalizarTexto(p.partNumber);
      const okFamilia = !familia || pfamilia === familia;
      const okTexto = !q ||
        pfamilia.toLowerCase().includes(q) ||
        pdescripcion.toLowerCase().includes(q) ||
        ppart.toLowerCase().includes(q);
      return okFamilia && okTexto;
    })
    .sort((a,b) => Number(b.stock || 0) - Number(a.stock || 0));
  resultados.forEach(p => {
    const stock = Number(p.stock || 0);
    const div = document.createElement("div");
    div.className = stock > 0 ? "resultado" : "resultado stock-cero";
    div.innerHTML = `
      <strong>${p.descripcion || "Sin descripción"}</strong><br>
      Familia: ${p.familia || ""}<br>
      PartNumber: ${p.partNumber || ""}<br>
      Stock: ${stock}<br>
      Técnico: ${p.tecnico || ""}<br><br>
    `;
    const btnEditar = document.createElement("button");
    btnEditar.type = "button";
    btnEditar.textContent = "Editar";
    btnEditar.className = "gray";
    btnEditar.addEventListener("click", () => editarPieza(p.uid));
    const btnBorrar = document.createElement("button");
    btnBorrar.type = "button";
    btnBorrar.textContent = "Borrar";
    btnBorrar.className = "red";
    btnBorrar.style.marginLeft = "10px";
    btnBorrar.addEventListener("click", () => borrarPiezaDirecta(p.uid));
    div.appendChild(btnEditar);
    div.appendChild(btnBorrar);
    cont.appendChild(div);
  });
}
function editarPieza(piezaUid){
  const p = datos.inventario.find(x => x.uid === piezaUid);
  if(!p) return;
  document.getElementById("piezaUid").value = p.uid;
  document.getElementById("piezaFamilia").value = p.familia || "";
  document.getElementById("piezaDescripcion").value = p.descripcion || "";
  document.getElementById("piezaPartNumber").value = p.partNumber || "";
  document.getElementById("piezaStock").value = p.stock || "";
  document.getElementById("piezaTecnico").value = p.tecnico || "";
  document.getElementById("piezaNotas").value = p.notas || "";
}
function guardarPieza(){
  const piezaUid = document.getElementById("piezaUid").value;
  let p = piezaUid ? datos.inventario.find(x => x.uid === piezaUid) : null;
  if(!p){
    p = { uid: uid() };
    datos.inventario.push(p);
  }
  p.familia = normalizarTexto(document.getElementById("piezaFamilia").value);
  p.descripcion = normalizarTexto(document.getElementById("piezaDescripcion").value);
  p.partNumber = normalizarTexto(document.getElementById("piezaPartNumber").value);
  p.stock = document.getElementById("piezaStock").value;
  p.tecnico = normalizarTexto(document.getElementById("piezaTecnico").value);
  p.notas = normalizarTexto(document.getElementById("piezaNotas").value);
  guardarLocal();
  limpiarPieza();
  actualizarFamilias();
  buscarPiezas();
  alert("Pieza guardada.");
}
function borrarPieza(){
  const piezaUid = document.getElementById("piezaUid").value;
  if(!piezaUid){
    alert("Primero pulsa Editar o usa el botón Borrar de la pieza en la lista.");
    return;
  }
  borrarPiezaDirecta(piezaUid);
}
function borrarPiezaDirecta(piezaUid){
  const p = datos.inventario.find(x => x.uid === piezaUid);
  if(!p){
    alert("No encontrada.");
    return;
  }
  if(!confirm("¿Seguro que quieres borrar esta pieza?\n\n" + (p.descripcion || p.partNumber || "Sin descripción"))){
    return;
  }
  datos.inventario = datos.inventario.filter(x => x.uid !== piezaUid);
  guardarLocal();
  limpiarPieza();
  actualizarFamilias();
  buscarPiezas();
  alert("Pieza borrada.");
}
function limpiarPieza(){
  document.getElementById("piezaUid").value = "";
  document.getElementById("piezaFamilia").value = "";
  document.getElementById("piezaDescripcion").value = "";
  document.getElementById("piezaPartNumber").value = "";
  document.getElementById("piezaStock").value = "";
  document.getElementById("piezaTecnico").value = "";
  document.getElementById("piezaNotas").value = "";
}
function borrarFamilia(){
  const familia = normalizarTexto(document.getElementById("filtroFamilia").value);
  if(!familia){
    alert("Selecciona familia.");
    return;
  }
  const total = datos.inventario.filter(p => normalizarTexto(p.familia) === familia).length;
  if(total === 0){
    alert("No hay piezas en esa familia.");
    return;
  }
  if(!confirm("¿Seguro que quieres borrar la familia '" + familia + "' y sus " + total + " piezas?")){
    return;
  }
  datos.inventario = datos.inventario.filter(p => normalizarTexto(p.familia) !== familia);
  guardarLocal();
  document.getElementById("filtroFamilia").value = "";
  actualizarFamilias();
  buscarPiezas();
  limpiarPieza();
  alert("Familia borrada.");
}
/* JSON */
function exportarJSON(){
  guardarLocal();
  const blob = new Blob([JSON.stringify(datos, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "gestor_trabajo.json";
  a.click();
  URL.revokeObjectURL(url);
}
function importarJSON(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      datos = JSON.parse(ev.target.result);
      if(!Array.isArray(datos.clientes)) datos.clientes = [];
      if(!Array.isArray(datos.software)) datos.software = [];
      if(!Array.isArray(datos.euronet)) datos.euronet = [];
      if(!Array.isArray(datos.inventario)) datos.inventario = [];
      datos.clientes.forEach(x => { if(!x.uid) x.uid = uid(); });
      datos.software.forEach(x => {
        if(!x.uid) x.uid = uid();
        if(typeof x.generado === "undefined") x.generado = false;
      });
      datos.euronet.forEach(x => { if(!x.uid) x.uid = uid(); });
      datos.inventario.forEach(x => { if(!x.uid) x.uid = uid(); });
      guardar();
      alert("JSON importado.");
    };
    reader.readAsText(file);
  };
  input.click();
}
